<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KFC 1416 — Store Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
:root {
  --red: #E4002B;
  --red-dark: #b8001f;
  --red-glow: rgba(228,0,43,0.18);
  --cream: #FFF8F0;
  --warm: #FFF0DC;
  --terra: #C65D00;
  --terra-lt: #E87722;
  --charcoal: #1A1209;
  --mid: #3D2B1A;
  --muted: #7A6050;
  --border: rgba(60,35,10,0.13);
  --card: #FFFFFF;
  --shadow: 0 2px 18px rgba(30,10,0,0.08);
  --radius: 14px;
  --font-head: 'Bebas Neue', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-body);background:var(--cream);color:var(--charcoal);min-height:100vh;}

/* ── LOGIN ── */
#login-screen{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  background: linear-gradient(135deg,#1A0A00 0%,#3D1800 50%,#1A0A00 100%);
  position:relative;overflow:hidden;
}
#login-screen::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 30% 40%, rgba(228,0,43,0.25) 0%, transparent 55%),
             radial-gradient(circle at 75% 65%, rgba(232,119,34,0.18) 0%, transparent 50%);
}
.login-card{
  position:relative;z-index:2;
  background:rgba(255,248,240,0.04);
  border:1px solid rgba(255,248,240,0.12);
  backdrop-filter:blur(20px);
  border-radius:20px;
  padding:48px 44px;
  width:360px;
  text-align:center;
}
.login-logo{font-family:var(--font-head);font-size:52px;color:var(--red);letter-spacing:2px;line-height:1;}
.login-sub{color:rgba(255,248,240,0.5);font-size:11px;letter-spacing:3px;text-transform:uppercase;margin-bottom:36px;font-family:var(--font-mono);}
.login-card input{
  width:100%;padding:12px 16px;
  background:rgba(255,248,240,0.07);
  border:1px solid rgba(255,248,240,0.15);
  border-radius:10px;color:#fff;
  font-family:var(--font-body);font-size:14px;
  margin-bottom:12px;outline:none;
  transition:border-color .2s;
}
.login-card input::placeholder{color:rgba(255,248,240,0.35);}
.login-card input:focus{border-color:var(--red);}
.btn-login{
  width:100%;padding:13px;
  background:var(--red);border:none;border-radius:10px;
  color:#fff;font-family:var(--font-head);font-size:18px;letter-spacing:1px;
  cursor:pointer;transition:background .2s,transform .1s;
}
.btn-login:hover{background:var(--red-dark);}
.btn-login:active{transform:scale(0.98);}
.login-err{color:#ff6b6b;font-size:12px;margin-top:8px;min-height:18px;}

/* ── SHELL ── */
#app{display:none;min-height:100vh;flex-direction:column;}
header{
  background:var(--charcoal);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:60px;position:sticky;top:0;z-index:100;
  border-bottom:2px solid var(--red);
}
.header-logo{font-family:var(--font-head);font-size:26px;color:var(--red);letter-spacing:1px;}
.header-right{display:flex;align-items:center;gap:14px;}
.header-user{color:rgba(255,248,240,0.65);font-size:13px;font-family:var(--font-mono);}
.btn-logout{
  background:rgba(228,0,43,0.15);border:1px solid rgba(228,0,43,0.4);
  color:var(--red);font-size:12px;padding:6px 14px;border-radius:8px;
  cursor:pointer;font-family:var(--font-mono);transition:background .2s;
}
.btn-logout:hover{background:rgba(228,0,43,0.3);}

/* ── NAV TABS ── */
nav{
  background:#fff;border-bottom:1px solid var(--border);
  display:flex;gap:0;overflow-x:auto;
  padding:0 20px;
}
nav button{
  background:none;border:none;border-bottom:3px solid transparent;
  font-family:var(--font-body);font-weight:500;font-size:13px;
  color:var(--muted);padding:14px 16px;cursor:pointer;
  white-space:nowrap;transition:color .2s,border-color .2s;
}
nav button.active{color:var(--red);border-bottom-color:var(--red);}
nav button:hover:not(.active){color:var(--charcoal);}

/* ── MAIN ── */
main{flex:1;padding:28px 24px;max-width:1200px;width:100%;margin:0 auto;}

/* ── SECTION TITLES ── */
.section-title{
  font-family:var(--font-head);font-size:32px;
  color:var(--charcoal);letter-spacing:.5px;margin-bottom:6px;
}
.section-sub{color:var(--muted);font-size:13px;margin-bottom:24px;}

/* ── CARDS ── */
.card{
  background:var(--card);border-radius:var(--radius);
  box-shadow:var(--shadow);border:1px solid var(--border);
  padding:20px 22px;margin-bottom:18px;
}
.card-title{font-weight:600;font-size:14px;margin-bottom:14px;color:var(--charcoal);}

/* ── STATS ROW ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px;}
.stat-card{
  background:var(--card);border-radius:var(--radius);
  border:1px solid var(--border);box-shadow:var(--shadow);
  padding:18px 20px;
}
.stat-num{font-family:var(--font-head);font-size:38px;line-height:1;color:var(--red);}
.stat-label{font-size:12px;color:var(--muted);margin-top:4px;font-family:var(--font-mono);}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead{background:var(--charcoal);}
th{color:rgba(255,248,240,0.8);font-family:var(--font-mono);font-size:11px;font-weight:500;
   text-align:left;padding:10px 14px;letter-spacing:.5px;}
td{padding:10px 14px;border-bottom:1px solid var(--border);color:var(--charcoal);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--warm);}

/* ── BADGES ── */
.badge{
  display:inline-block;padding:3px 10px;border-radius:20px;
  font-size:11px;font-family:var(--font-mono);font-weight:500;
}
.badge-sm{background:rgba(62,135,255,0.12);color:#2255cc;}
.badge-cook{background:rgba(232,119,34,0.12);color:var(--terra);}
.badge-tm{background:rgba(80,180,100,0.12);color:#1e7a36;}
.badge-agm{background:rgba(228,0,43,0.12);color:var(--red);}

/* ── BUTTONS ── */
.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 18px;border-radius:9px;border:none;
  font-family:var(--font-body);font-weight:500;font-size:13px;
  cursor:pointer;transition:all .18s;
}
.btn-primary{background:var(--red);color:#fff;}
.btn-primary:hover{background:var(--red-dark);}
.btn-secondary{background:var(--warm);color:var(--charcoal);border:1px solid var(--border);}
.btn-secondary:hover{background:#ffe8c8;}
.btn-danger{background:rgba(228,0,43,0.1);color:var(--red);border:1px solid rgba(228,0,43,0.25);}
.btn-danger:hover{background:rgba(228,0,43,0.2);}
.btn-sm{padding:5px 12px;font-size:12px;}

/* ── FORM ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group label{font-size:12px;font-weight:500;color:var(--muted);font-family:var(--font-mono);}
.form-group input,.form-group select{
  padding:10px 13px;border-radius:9px;
  border:1px solid var(--border);
  font-family:var(--font-body);font-size:13px;
  outline:none;background:#fff;
  transition:border-color .2s;
}
.form-group input:focus,.form-group select:focus{border-color:var(--red);}

/* ── SCHEDULE GRID ── */
.sched-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.sched-day{
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:12px 10px;min-height:180px;
}
.sched-day-head{
  font-family:var(--font-mono);font-size:11px;font-weight:500;
  color:var(--muted);text-transform:uppercase;
  padding-bottom:8px;border-bottom:1px solid var(--border);
  margin-bottom:8px;display:flex;justify-content:space-between;
}
.sched-day-head .day-type{
  font-size:9px;padding:2px 6px;border-radius:10px;
  background:rgba(228,0,43,0.1);color:var(--red);
}
.shift-slot{
  background:var(--warm);border-radius:7px;padding:6px 8px;
  margin-bottom:6px;font-size:11px;border-left:3px solid var(--terra-lt);
}
.shift-slot.sm{border-left-color:var(--red);}
.shift-slot.cook{border-left-color:var(--terra);}
.shift-slot.empty{border-left-color:#ccc;background:#f8f4f0;color:var(--muted);font-style:italic;}
.shift-time{font-family:var(--font-mono);font-size:10px;color:var(--muted);}
.shift-name{font-weight:500;font-size:11px;margin-top:2px;}
.shift-role{font-size:10px;color:var(--muted);}

/* ── EXPIRY ── */
.expiry-row td:last-child{font-weight:600;}
.exp-green{color:#1e7a36;}
.exp-orange{color:#c65d00;}
.exp-red{color:var(--red);}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;}
.dot-green{background:#2ea84b;}
.dot-orange{background:#e87722;}
.dot-red{background:var(--red);}

/* ── MESSAGE ── */
.msg-item{
  background:var(--warm);border-radius:10px;padding:14px 16px;
  margin-bottom:10px;border-left:3px solid var(--terra-lt);
}
.msg-meta{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:6px;}
.msg-body{font-size:13px;}

/* ── AVAIL ── */
.avail-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.avail-day{
  background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:10px;text-align:center;
}
.avail-day-name{font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:8px;}
.avail-emp{
  background:var(--warm);border-radius:6px;padding:4px 6px;
  font-size:11px;margin-bottom:4px;
}

/* ── EMPLOYEE DASH (user role) ── */
.user-sched-card{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  border:1px solid var(--border);padding:20px;margin-bottom:14px;
}
.my-shift{
  display:flex;align-items:center;gap:14px;
  padding:12px 0;border-bottom:1px solid var(--border);
}
.my-shift:last-child{border-bottom:none;}
.my-shift-day{
  font-family:var(--font-head);font-size:22px;color:var(--red);width:40px;
}
.my-shift-info{flex:1;}
.my-shift-time{font-family:var(--font-mono);font-size:12px;color:var(--muted);}

/* ── MODAL ── */
.modal-backdrop{
  display:none;position:fixed;inset:0;
  background:rgba(10,5,0,0.55);z-index:500;
  align-items:center;justify-content:center;
}
.modal-backdrop.open{display:flex;}
.modal{
  background:#fff;border-radius:16px;width:480px;max-width:95vw;
  box-shadow:0 20px 60px rgba(0,0,0,0.25);
  max-height:90vh;overflow-y:auto;
}
.modal-head{
  padding:20px 24px 0;display:flex;justify-content:space-between;align-items:center;
}
.modal-head h3{font-family:var(--font-head);font-size:24px;}
.modal-close{
  background:none;border:none;font-size:22px;cursor:pointer;
  color:var(--muted);transition:color .15s;
}
.modal-close:hover{color:var(--red);}
.modal-body{padding:20px 24px 24px;}

/* ── TOASTS ── */
#toasts{position:fixed;bottom:24px;right:24px;z-index:1000;display:flex;flex-direction:column;gap:8px;}
.toast{
  background:var(--charcoal);color:#fff;
  border-radius:10px;padding:12px 18px;
  font-size:13px;border-left:3px solid var(--red);
  animation:slideIn .25s ease;max-width:300px;
}
.toast.success{border-left-color:#2ea84b;}
.toast.warning{border-left-color:#e87722;}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── TABS WITHIN SECTION ── */
.inner-tabs{display:flex;gap:6px;margin-bottom:18px;}
.inner-tab{
  padding:7px 16px;border-radius:8px;border:1px solid var(--border);
  font-size:12px;font-family:var(--font-mono);cursor:pointer;
  background:#fff;color:var(--muted);transition:all .15s;
}
.inner-tab.active{background:var(--charcoal);color:#fff;border-color:var(--charcoal);}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.toolbar input[type=text]{
  flex:1;min-width:180px;padding:9px 13px;
  border-radius:9px;border:1px solid var(--border);
  font-size:13px;font-family:var(--font-body);outline:none;
}
.toolbar input:focus{border-color:var(--red);}

/* ── AVAIL FORM ── */
.day-avail-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.day-avail-row label{width:80px;font-size:12px;font-family:var(--font-mono);}
.day-avail-row input[type=checkbox]{accent-color:var(--red);}
.day-avail-row input[type=time]{
  padding:5px 8px;border-radius:7px;border:1px solid var(--border);
  font-size:12px;font-family:var(--font-mono);outline:none;
}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(60,35,10,0.2);border-radius:6px;}

@media(max-width:700px){
  .sched-grid{grid-template-columns:1fr 1fr;}
  .form-row{grid-template-columns:1fr;}
  .stats-row{grid-template-columns:1fr 1fr;}
  .avail-grid{grid-template-columns:1fr 1fr;}
}
</style>
</head>

  STATE.user=null;STATE.role=null;STATE.uid=null;STATE.firebaseUid=null;STATE.myAvailData=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';

async function ensureSeedData(){
  // load from local state if Firebase not available
  if(STATE.employees.length===0) STATE.employees=[...SEED_EMPLOYEES];
}

async function loadEmployees(){
  try{
    const snap=await getDocs(collection(db,'employees_1416'));
    if(snap.empty){
      // seed
      for(const emp of SEED_EMPLOYEES){
        await setDoc(doc(db,'employees_1416',emp.id),emp);
      }
      STATE.employees=[...SEED_EMPLOYEES];
    } else {
      STATE.employees=snap.docs.map(d=>({...d.data(),_fid:d.id}));
    }
  }catch(e){ STATE.employees=[...SEED_EMPLOYEES]; }
}

async function loadProducts(){
  try{
    const snap=await getDocs(collection(db,'products_1416'));
    STATE.products=snap.docs.map(d=>({...d.data(),_fid:d.id}));
  }catch(e){
    STATE.products=[
      {name:'Original Recipe Chicken',expiry:'2026-04-12',_fid:'p1'},
      {name:'Coleslaw Mix',expiry:'2026-04-11',_fid:'p2'},
      {name:'Zinger Patties',expiry:'2026-04-15',_fid:'p3'},
      {name:'Gravy Sauce',expiry:'2026-04-10',_fid:'p4'},
      {name:'Popcorn Chicken',expiry:'2026-04-13',_fid:'p5'},
    ];
  }
}

async function loadMessages(){
  try{
    const snap=await getDocs(query(collection(db,'messages_1416'),orderBy('ts','desc')));
    STATE.messages=snap.docs.map(d=>({...d.data(),_fid:d.id}));
  }catch(e){ STATE.messages=[]; }
}

async function loadSchedule(){
  try{
    const weekKey=fmtDate(STATE.currentWeek);
    const snap=await getDoc(doc(db,'schedules_1416',weekKey));
    STATE.schedules[weekKey]=snap.exists()?snap.data().days:{};
  }catch(e){ STATE.schedules[fmtDate(STATE.currentWeek)]={}; }
}

async function loadAvailability(){
  try{
    const snap=await getDocs(collection(db,'availability_1416'));
    const avail={};
    snap.docs.forEach(d=>{ avail[d.id]=d.data(); });
    STATE.availability=avail;
  }catch(e){ STATE.availability={}; }
}

// Load the current user's OWN availability doc (by real Firebase UID)
async function loadMyAvailability(){
  if(!STATE.firebaseUid) return;
  try{
    const snap=await getDoc(doc(db,'availability_1416', STATE.firebaseUid));
    if(snap.exists()){
      STATE.myAvailData = snap.data();       // {name, days, submitted, locked}
    } else {
      STATE.myAvailData = null;
    }
  }catch(e){ STATE.myAvailData=null; }
}

// ── SHOW APP ──
async function showApp(){
  document.getElementById('login-screen').style.display='none';
  const appEl=document.getElementById('app');
  appEl.style.display='flex';
  document.getElementById('header-user-label').textContent=
    (STATE.user?.name||STATE.user?.email||'')+ ' · '+(STATE.role==='admin'?'Admin':'Employee');
  if(STATE.role==='admin'){
    await Promise.all([loadEmployees(),loadProducts(),loadMessages(),loadSchedule(),loadAvailability()]);

window.navigate = function(tabId){
  document.querySelectorAll('nav button').forEach(b=>{
    b.classList.toggle('active',b.dataset.tab===tabId);
  });
  const el=document.getElementById('main-content');
  const renders={
    'dashboard':renderDashboard,
    'employees':renderEmployees,
    'schedule':renderSchedule,
    'availability':renderAvailability,

    'messages':renderMessages,
    'order':renderOrder,
    'my-schedule':renderMySchedule,
    'my-availability':renderMyAvailability,
    'my-message':renderMyMessage,
  };
  if(renders[tabId]) el.innerHTML=renders[tabId]();
  attachTabHandlers(tabId);
};

function attachTabHandlers(tabId){
  if(tabId==='employees') attachEmployeeHandlers();
  if(tabId==='expiry') attachExpiryHandlers();
  if(tabId==='messages') attachMessageHandlers();
  if(tabId==='schedule') attachScheduleHandlers();

// ── SCHEDULE ──
const DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const TYPE_A=['Monday','Wednesday','Sunday'];
const TYPE_B=['Tuesday','Thursday','Friday','Saturday'];

function getShiftStructure(day){
  const isB=TYPE_B.includes(day);
  return {
    opening:[
      {time:'9:30 AM – 5:00 PM',role:'Shift Manager',key:'op_sm'},
      {time:'9:30 AM – 5:00 PM',role:'Cook',key:'op_cook'},
      {time:'10:00 AM – 6:00 PM',role:'Team Member',key:'mid_tm'},
    ],
    evening:[
      {time:'5:00 PM – 11:30 PM',role:'Shift Manager',key:'ev_sm'},
      {time:'5:00 PM – 11:30 PM',role:'Cook',key:'ev_cook'},
      {time:'5:00 PM – 11:30 PM',role:'Team Member',key:'ev_tm'},
    ],
    extra: isB?[
      {time:'12:00 PM – 8:00 PM',role:'Team Member',key:'mid2_tm'},
      {time:'5:00 PM – 10:30 PM',role:'Team Member',key:'close_tm'},
    ]:[],
  };
}

function renderSchedule(){
  const weekKey=fmtDate(STATE.currentWeek);
  const days=STATE.schedules[weekKey]||{};
  const cols=DAYS.map((day,i)=>{
    const dt=new Date(STATE.currentWeek); dt.setDate(dt.getDate()+i);
    const isB=TYPE_B.includes(day);
    const struct=getShiftStructure(day);
    const allSlots=[...struct.opening,...struct.evening,...struct.extra];
    const assigned=days[day]||{};
    const slots=allSlots.map(s=>{
      const who=assigned[s.key];
      if(who){
        return `<div class="shift-slot ${s.role==='Shift Manager'?'sm':s.role==='Cook'?'cook':''}">
          <div class="shift-time">${s.time}</div>
          <div class="shift-name">${who}</div>
          <div class="shift-role">${s.role}</div>
        </div>`;
      }
      return `<div class="shift-slot empty"><div class="shift-time">${s.time}</div><div class="shift-name">Unassigned</div><div class="shift-role">${s.role}</div></div>`;
    }).join('');
    return `<div class="sched-day">
      <div class="sched-day-head">
        <span>${day.substring(0,3).toUpperCase()} ${dt.getDate()}</span>
        <span class="day-type">Type ${isB?'B':'A'}</span>
      </div>
      ${slots}
    </div>`;
  }).join('');

  return `
  <div class="section-title">Schedule Builder</div>
  <div class="section-sub">Week of ${STATE.currentWeek.toDateString()}</div>
  <div class="toolbar">
    <button class="btn btn-secondary" onclick="prevWeek()">← Prev</button>
    <button class="btn btn-secondary" onclick="nextWeek()">Next →</button>
    <button class="btn btn-primary" onclick="autoAssign()">⚡ Auto-Assign</button>
    <button class="btn btn-secondary" onclick="saveSchedule()">💾 Save Schedule</button>
    <button class="btn btn-secondary" onclick="validateSchedule()">✓ Validate</button>
  </div>
  <div class="sched-grid" id="sched-grid">${cols}</div>
  <div id="sched-validation" style="margin-top:16px"></div>`;
}

function attachScheduleHandlers(){
  window.prevWeek=function(){
    STATE.currentWeek=new Date(STATE.currentWeek.getTime()-7*86400000);
    navigate('schedule');
  };
  window.nextWeek=function(){
    STATE.currentWeek=new Date(STATE.currentWeek.getTime()+7*86400000);
    navigate('schedule');
  };

  window.autoAssign=function(){
    const weekKey=fmtDate(STATE.currentWeek);
    const avail=STATE.availability;
    const sms=STATE.employees.filter(e=>e.role==='Shift Manager'||e.role==='Shift Manager in Training');
    const tms=STATE.employees.filter(e=>e.role==='Team Member');
    const schedule={};
    const smUsed={}; const tmUsed={};

    DAYS.forEach((day,i)=>{
      const struct=getShiftStructure(day);
      const allSlots=[...struct.opening,...struct.evening,...struct.extra];
      const assigned={};
      let smIdx=0; let tmIdx=0;

      allSlots.forEach(s=>{
        if(s.role==='Shift Manager'||s.role==='Cook'){
          // pick next available SM
          while(smIdx<sms.length && (smUsed[sms[smIdx]?.id]||0)>=5) smIdx++;
          if(smIdx<sms.length){
            assigned[s.key]=shortName(sms[smIdx].name);
            smUsed[sms[smIdx].id]=(smUsed[sms[smIdx].id]||0)+1;
            smIdx++;
          }
        } else {
          while(tmIdx<tms.length && (tmUsed[tms[tmIdx]?.id]||0)>=5) tmIdx++;
          if(tmIdx<tms.length){
            assigned[s.key]=shortName(tms[tmIdx].name);
            tmUsed[tms[tmIdx].id]=(tmUsed[tms[tmIdx].id]||0)+1;
            tmIdx++;
          }
        }
      });
      schedule[day]=assigned;
    });

    STATE.schedules[weekKey]=schedule;
    navigate('schedule');
    toast('Auto-assigned! Review and save.','success');
  };

  window.saveSchedule=async function(){
    const weekKey=fmtDate(STATE.currentWeek);
    try{
      await setDoc(doc(db,'schedules_1416',weekKey),{days:STATE.schedules[weekKey]||{},updated:serverTimestamp()});
    }catch(e){}
    toast('Schedule saved','success');
  };

  window.validateSchedule=function(){
    const weekKey=fmtDate(STATE.currentWeek);
    const days=STATE.schedules[weekKey]||{};
    const issues=[];
    DAYS.forEach(day=>{
      const struct=getShiftStructure(day);
      const all=[...struct.opening,...struct.evening,...struct.extra];
      const assigned=days[day]||{};
      const missing=all.filter(s=>!assigned[s.key]);
      if(missing.length) issues.push(`<strong>${day}</strong>: ${missing.length} unassigned slot(s) (${missing.map(s=>s.role).join(', ')})`);
    });
    const el=document.getElementById('sched-validation');
    if(issues.length){
      el.innerHTML=`<div class="card" style="border-left:3px solid var(--red)">
        <div class="card-title" style="color:var(--red)">⚠ Validation Issues</div>
        <ul style="padding-left:18px;font-size:13px;line-height:1.8">${issues.map(i=>`<li>${i}</li>`).join('')}</ul>
      </div>`;
    } else {
      el.innerHTML=`<div class="card" style="border-left:3px solid #2ea84b">
        <div class="card-title" style="color:#2ea84b">✓ Schedule looks complete!</div>
      </div>`;
    }
  };
}

// ── AVAILABILITY ──
function renderAvailability(){
  const avail=STATE.availability;
  const empIds=Object.keys(avail);
  if(empIds.length===0) return `
    <div class="section-title">Availability</div>
    <div class="section-sub">No submissions yet.</div>
    <div class="card"><p style="color:var(--muted)">No employees have submitted availability yet.</p></div>`;

  // Summary table with unlock button per person
  const tableRows = empIds.map(uid=>{
    const a = avail[uid];
    const name = a?.name||a?.email||uid;
    const isLocked = a?.locked===true;
    const date = a?.updatedAt||'—';
    const daysAvail = DAYS.filter(d=>a?.days?.[d]?.available).map(d=>d.substring(0,3)).join(', ')||'None';
    return `<tr>
      <td><strong>${name}</strong></td>
      <td style="font-size:12px">${daysAvail}</td>
      <td>${date}</td>
      <td>${isLocked
        ? `<span style="color:#2ea84b;font-size:12px;font-weight:600">\u2705 Submitted</span>`
        : `<span style="color:var(--muted);font-size:12px">In progress</span>`
      }</td>
      <td>${isLocked
        ? `<button class="btn btn-sm btn-secondary" onclick="unlockAvail('${uid}')">\uD83D\uDD13 Reopen</button>`
        : `<button class="btn btn-sm btn-danger" onclick="clearAvail('${uid}')">Clear</button>`
      }</td>
    </tr>`;
  }).join('');

  // Day-by-day grid
  const cols=DAYS.map(day=>{
    const emps=empIds.filter(uid=>avail[uid]?.days?.[day]?.available);
    return `<div class="avail-day">
      <div class="avail-day-name">${day.substring(0,3).toUpperCase()}</div>
      ${emps.length?emps.map(uid=>`<div class="avail-emp">${avail[uid]?.name?.split(',')[0]||uid}</div>`).join(''):'<div style="font-size:11px;color:var(--muted)">—</div>'}
    </div>`;
  }).join('');

  return `
  <div class="section-title">Availability</div>
  <div class="section-sub">${empIds.length} submission(s) received</div>
  <div class="card" style="margin-bottom:18px">
    <div class="card-title">Submission Status</div>
    <div class="tbl-wrap">
      <table>
        <thead><tr><th>Employee</th><th>Available Days</th><th>Submitted</th><th>Status</th><th>Action</th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Day-by-Day Overview</div>
    <div class="avail-grid">${cols}</div>
  </div>`;
}

// Admin: unlock a staff member's availability so they can resubmit
window.unlockAvail = async function(uid){
  try{
    await updateDoc(doc(db,'availability_1416',uid),{locked:false,submitted:false});
    STATE.availability[uid].locked=false;
    STATE.availability[uid].submitted=false;
    navigate('availability');
    toast('Availability reopened for '+STATE.availability[uid].name,'success');
  }catch(e){
    toast('Error: '+e.message,'warning');
  }
};

window.clearAvail = async function(uid){
  if(!confirm('Clear this submission?'))return;
  try{await deleteDoc(doc(db,'availability_1416',uid));}catch(e){}
  delete STATE.availability[uid];
  navigate('availability');
  toast('Cleared');
};

function renderExpiry(){
  const today=new Date(); today.setHours(0,0,0,0);
  const rows=STATE.products.map(p=>{
    const d=new Date(p.expiry); d.setHours(0,0,0,0);
    const diff=Math.ceil((d-today)/86400000);
    let cls='exp-green',dot='dot-green',label=`${diff}d left`;
    if(diff<=0){cls='exp-red';dot='dot-red';label='EXPIRED';}
    else if(diff<=3){cls='exp-orange';dot='dot-orange';label=`${diff}d — alert!`;}
    return `<tr class="expiry-row">
      <td><strong>${p.name}</strong></td>
      <td style="font-family:var(--font-mono);font-size:12px">${p.expiry}</td>
      <td class="${cls}"><span class="dot ${dot}"></span>${label}</td>
      <td>
        <button class="btn btn-sm btn-danger" onclick="deleteProduct('${p._fid}')">Remove</button>
      </td>
    </tr>`;
  }).join('');

  return `
  <div class="section-title">Expiry Tracker</div>
  <div class="section-sub">Monitor product freshness</div>
  <div class="toolbar">
    <button class="btn btn-primary" onclick="openAddProduct()">+ Add Product</button>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr><th>Product</th><th>Expiry Date</th><th>Status</th><th>Action</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

// ── MY SCHEDULE (Employee) ──
function renderMySchedule(){
  const weekKey=fmtDate(STATE.currentWeek);
  const days=STATE.schedules[weekKey]||{};
  const myName=shortName(STATE.user?.name||'');
  const myShifts=[];
  DAYS.forEach((day,i)=>{
    const assigned=days[day]||{};
    Object.entries(assigned).forEach(([key,who])=>{
      if(who&&who.toLowerCase().includes(myName.toLowerCase())){
        const struct=getShiftStructure(day);
        const allSlots=[...struct.opening,...struct.evening,...struct.extra];
        const slot=allSlots.find(s=>s.key===key);
        if(slot) myShifts.push({day,time:slot.time,role:slot.role,dayIdx:i});
      }
    });
  });

  const shiftsHtml=myShifts.length?myShifts.map(s=>`
    <div class="my-shift">
      <div class="my-shift-day">${s.day.substring(0,3).toUpperCase()}</div>
      <div class="my-shift-info">
        <div style="font-weight:500">${s.day}</div>
        <div class="my-shift-time">${s.time}</div>
      </div>
      <span class="badge ${getBadgeClass(s.role)}">${s.role}</span>
    </div>`).join(''):`<p style="color:var(--muted);font-size:13px">No shifts assigned this week.</p>`;

  return `
  <div class="section-title">My Schedule</div>
  <div class="section-sub">Week of ${STATE.currentWeek.toDateString()}</div>
  <div class="toolbar">
    <button class="btn btn-secondary" onclick="prevWeek()">← Prev Week</button>
    <button class="btn btn-secondary" onclick="nextWeek()">Next Week →</button>
  </div>
  <div class="user-sched-card">${shiftsHtml}</div>`;
}

function renderMyAvailability(){
  const saved = STATE.myAvailData || {};
  const isLocked = saved.locked === true;
  const isSubmitted = saved.submitted === true;

  // If locked (already submitted and admin has not reopened), show read-only view
  if(isLocked){
    const rows = DAYS.map(day=>{
      const d = saved.days?.[day];
      const avail = d?.available;
      return `<div class="day-avail-row" style="opacity:0.8">
        <label style="width:90px;font-weight:${avail?'600':'400'};color:${avail?'var(--charcoal)':'var(--muted)'}">
          ${avail?'\u2705':'\u274c'} ${day.substring(0,3)}
        </label>
        ${avail?`<span style="font-family:var(--font-mono);font-size:12px">${d?.from||'--:--'} \u2014 ${d?.to||'--:--'}</span>`:'<span style="font-size:12px;color:var(--muted)">Not available</span>'}
      </div>`;
    }).join('');
    return `
    <div class="section-title">My Availability</div>
    <div class="section-sub">Submitted \u2014 waiting for manager to review</div>
    <div class="card" style="border-left:4px solid #2ea84b">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 14px;background:rgba(46,168,75,0.08);border-radius:9px">
        <span style="font-size:20px">\u2705</span>
        <div>
          <div style="font-weight:600;font-size:14px">Availability Submitted</div>
          <div style="font-size:12px;color:var(--muted)">Submitted on ${saved.updatedAt||''}. Your manager will review it.</div>
        </div>
      </div>
      ${rows}
      <p style="margin-top:14px;font-size:12px;color:var(--muted);padding:10px;background:var(--warm);border-radius:8px">
        \u{1F512} Your availability is locked. If you need to make changes, ask your manager to reopen it.
      </p>
    </div>`;
  }

  // Not yet submitted — show editable form
  const rows=DAYS.map(day=>{
    const d=saved?.days?.[day];
    return `<div class="day-avail-row">
      <label><input type="checkbox" id="av-${day}" ${d?.available?'checked':''}> ${day.substring(0,3)}</label>
      <input type="time" id="avf-${day}" value="${d?.from||'09:00'}">
      <span style="font-size:12px;color:var(--muted)">to</span>
      <input type="time" id="avt-${day}" value="${d?.to||'17:00'}">
    </div>`;
  }).join('');

  return `
  <div class="section-title">My Availability</div>
  <div class="section-sub">Fill in your availability then submit. You can only submit once.</div>
  <div class="card">
    ${rows}
    <button class="btn btn-primary" style="margin-top:16px;width:100%" onclick="saveMyAvail()">
      \u{1F4BE} Save & Submit Availability
    </button>
    <p style="margin-top:10px;font-size:12px;color:var(--muted)">
      \u26a0\ufe0f Once submitted, you cannot edit again unless your manager reopens it.
    </p>
  </div>`;
}

function attachMyAvailHandlers(){
  window.saveMyAvail=async function(){
    const uid = STATE.firebaseUid;
    if(!uid || uid==='demo_admin'){toast('Cannot save: not logged in with a real account','warning');return;}

    const days={};
    DAYS.forEach(day=>{
      days[day]={
        available:document.getElementById(`av-${day}`)?.checked||false,
        from:document.getElementById(`avf-${day}`)?.value||'09:00',
        to:document.getElementById(`avt-${day}`)?.value||'17:00',
      };
    });

    const data={
      name: STATE.user?.name||STATE.user?.email||'',
      email: STATE.user?.email||'',
      days,
      submitted: true,
      locked: true,
      updatedAt: new Date().toLocaleDateString('en-CA'),
    };

    try{
      await setDoc(doc(db,'availability_1416', uid), data);
      STATE.myAvailData = data;
      toast('Availability submitted!','success');
      navigate('my-availability');
    }catch(err){
      console.error('Firestore write error:',err);
      toast('Error saving: '+err.message,'warning');
    }
  };
}
